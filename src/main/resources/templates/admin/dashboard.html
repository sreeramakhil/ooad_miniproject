<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>StockFlow – Admin</title>
    <link rel="stylesheet" th:href="@{/css/main.css}"/>
</head>
<body>
<nav>
    <div class="nav-container">
        <a class="logo" href="/store">📦 StockFlow</a>
        <div class="nav-menu">
            <a class="nav-link" href="/store">Shop</a>
            <a class="nav-link" href="/orders">My Orders</a>
            <a class="nav-link active" href="/admin">Admin</a>
            <form th:action="@{/logout}" method="post" style="display:inline">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="btn btn-sm btn-secondary">Logout</button>
            </form>
            <a class="nav-link" href="/cart">🛒 <span class="cart-badge">0</span></a>
        </div>
    </div>
</nav>
<main class="container">
    <div class="alert alert-success" th:if="${message}" th:text="${message}"></div>
    <h1 class="mb-3">Admin Panel</h1>
    <div class="admin-layout">
        <nav class="sidebar">
            <a class="sidebar-link active" href="/admin">📊 Dashboard</a>
            <a class="sidebar-link" href="/admin/products">📦 Products</a>
            <a class="sidebar-link" href="/admin/orders">📋 Orders</a>
            <a class="sidebar-link" href="/admin/notifications">🔔 Notifications</a>
        </nav>
        <div class="card">
            <h2 class="mb-3">📊 Dashboard Overview</h2>
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-label">Total Revenue</div>
                    <div class="stat-value" th:text="'$' + ${#numbers.formatDecimal(revenue,1,2)}">$0.00</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Total Orders</div>
                    <div class="stat-value" th:text="${totalOrders}">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Total Products</div>
                    <div class="stat-value" th:text="${totalProducts}">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Low Stock</div>
                    <div class="stat-value" th:text="${lowStock}">0</div>
                </div>
            </div>
            <div class="flex gap-2" style="flex-wrap:wrap">
                <a class="btn btn-primary" href="/admin/products">📦 Manage Products</a>
                <a class="btn btn-secondary" href="/admin/orders">📋 View Orders</a>
                <a class="btn btn-success" href="/admin/notifications">🔔 Notifications
                    <span th:if="${unreadNotifications > 0}" th:text="'(' + ${unreadNotifications} + ')'"></span>
                </a>
            </div>
        </div>
    </div>
</main>
</body>
</html>
