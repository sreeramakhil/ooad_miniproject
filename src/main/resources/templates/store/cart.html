<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>StockFlow – Cart</title>
    <link rel="stylesheet" th:href="@{/css/main.css}"/>
</head>
<body>
<nav>
    <div class="nav-container">
        <a class="logo" href="/store">📦 StockFlow</a>
        <div class="nav-menu">
            <a class="nav-link" href="/store">Shop</a>
            <a class="nav-link" href="/orders" sec:authorize="isAuthenticated()">My Orders</a>
            <a class="nav-link" href="/admin" sec:authorize="hasRole('ADMIN')">Admin</a>
            <a class="nav-link" href="/login" sec:authorize="isAnonymous()">Login</a>
            <a class="nav-link" href="/signup" sec:authorize="isAnonymous()">Sign Up</a>
            <th:block sec:authorize="isAuthenticated()">
                <form th:action="@{/logout}" method="post" style="display:inline">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <button type="submit" class="btn btn-sm btn-secondary">Logout</button>
                </form>
            </th:block>
            <a class="nav-link" href="/cart">🛒 <span class="cart-badge" th:text="${cartSize != null ? cartSize : 0}">0</span></a>
        </div>
    </div>
</nav>
<main class="container">
    <div class="alert alert-success" th:if="${message}" th:text="${message}"></div>
    <div class="alert alert-error"   th:if="${error}"   th:text="${error}"></div>
    <h1 class="mb-3">🛒 Shopping Cart</h1>
    <div class="empty-state" th:if="${#lists.isEmpty(cartItems)}">
        <div class="empty-icon">🛒</div>
        <h3>Your cart is empty</h3>
        <a class="btn btn-primary mt-2" href="/store">Start Shopping</a>
    </div>
    <div th:if="${not #lists.isEmpty(cartItems)}">
        <div class="cart-row" th:each="item : ${cartItems}">
            <div>
                <div class="font-bold" th:text="${item.icon + ' ' + item.productName}">Item</div>
                <div class="text-light text-sm" th:text="'$' + ${#numbers.formatDecimal(item.price,1,2)} + ' x ' + ${item.quantity}"></div>
            </div>
            <div class="flex gap-2" style="align-items:center">
                <strong th:text="'$' + ${#numbers.formatDecimal(item.lineTotal,1,2)}">$0.00</strong>
                <form th:action="@{/cart/remove/{id}(id=${item.productId})}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <button type="submit" class="btn btn-danger btn-sm">Remove</button>
                </form>
            </div>
        </div>
        <div class="card mt-3" style="max-width:400px; margin-left:auto">
            <div class="flex" style="justify-content:space-between; margin-bottom:0.5rem">
                <span>Subtotal:</span><span th:text="'$' + ${#numbers.formatDecimal(subtotal,1,2)}">$0.00</span>
            </div>
            <div class="flex" style="justify-content:space-between; margin-bottom:1rem">
                <span>Tax (10%):</span><span th:text="'$' + ${#numbers.formatDecimal(tax,1,2)}">$0.00</span>
            </div>
            <div class="flex border-top font-bold" style="justify-content:space-between; padding-top:1rem; font-size:1.2rem; margin-bottom:1.5rem">
                <span>Total:</span><span th:text="'$' + ${#numbers.formatDecimal(total,1,2)}">$0.00</span>
            </div>
            <form th:action="@{/cart/checkout}" method="post" sec:authorize="isAuthenticated()">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="btn btn-primary btn-block">✅ Place Order</button>
            </form>
            <p class="text-center text-light mt-2" sec:authorize="isAnonymous()">
                <a href="/login">Log in</a> to place your order
            </p>
        </div>
    </div>
</main>
</body>
</html>
